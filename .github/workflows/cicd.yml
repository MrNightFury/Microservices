name: Deno

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: check
        run: |
          ls -la
      
      - name: Build docker image
        run: | 
          docker build $GITHUB_WORKSPACE --file Dockerfile --tag delivery-service:latest 

      - name: log in dockerhub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }}
