name: Deno

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2

      - name: Run tests
        run: deno test --allow-all
        
  build-container:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
          
      - name: Build docker image
        working-directory: pingService
        run: | 
          docker build . --tag ping-service:latest
          docker save ping-service:latest -o ping-service.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: pingService/ping-service.tar

  push-to-dockerhub:
    needs: build-container
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: pingService
          
      - name: log in dockerhub
        uses: docker/login-action@v3
        with: 
          username: ${{ vars.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push container to DockerHub
        working-directory: pingService
        run: | 
          docker load --input ping-service.tar
          docker push ${{ vars.DOCKER_USERNAME }}/ping-service:latest 
